<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>搭配建议 - 直搭数字衣柜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="suggestion">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html"><span class="brand-mark">搭</span><span>直搭数字衣柜</span></a>
      <nav class="desktop-nav" aria-label="主导航">
        <a class="nav-link" data-nav="home" href="index.html">首页</a>
        <a class="nav-link" data-nav="wardrobe" href="wardrobe.html">衣橱</a>
        <a class="nav-link" data-nav="outfit" href="outfit.html">今日穿搭</a>
        <a class="nav-link" data-nav="suggestion" href="suggestion.html">搭配建议</a>
        <a class="nav-link" data-nav="tryon" href="tryon.html">试衣间</a>
      </nav>
      <button class="menu-button" id="menuButton" aria-label="打开菜单" aria-expanded="false">☰</button>
    </div>
    <nav class="container mobile-nav" id="mobileNav" aria-label="移动端导航">
      <a class="nav-link" data-nav="home" href="index.html">首页</a>
      <a class="nav-link" data-nav="wardrobe" href="wardrobe.html">衣橱</a>
      <a class="nav-link" data-nav="outfit" href="outfit.html">今日穿搭</a>
      <a class="nav-link" data-nav="suggestion" href="suggestion.html">搭配建议</a>
      <a class="nav-link" data-nav="tryon" href="tryon.html">试衣间</a>
    </nav>
  </header>

  <main>
    <div class="container">
      <div class="section-head">
        <div>
          <p class="eyebrow">Style Advice</p>
          <h1 style="color: var(--ink); font-size: clamp(32px, 5vw, 52px);">搭配建议</h1>
          <p class="subtle">本地规则可直接生成建议；填写 API Key 后可调用 OpenAI 兼容模型增强结果。</p>
        </div>
      </div>

      <section class="workspace">
        <aside class="panel">
          <h2>偏好设置</h2>
          <form class="form-grid" id="suggestionForm">
            <label>风格偏好<select class="select" id="stylePreference"></select></label>
            <label>颜色偏好
              <select class="select" id="colorPreference">
                <option value="all">不限颜色</option>
                <option value="暖色">暖色</option>
                <option value="冷色">冷色</option>
                <option value="中性色">中性色</option>
                <option value="低饱和">低饱和</option>
              </select>
            </label>
            <label>模型 API Key（可选）
              <input class="field" id="apiKey" type="password" autocomplete="off" placeholder="不填写则使用本地建议">
            </label>
            <label>Base URL
              <input class="field" id="modelBaseUrl" value="https://api.deepseek.com/v1">
            </label>
            <label>模型名称
              <input class="field" id="modelName" value="deepseek-chat">
            </label>
            <button class="btn btn-primary" id="suggestionSubmit" type="submit">生成搭配建议</button>
          </form>
        </aside>

        <section>
          <div id="suggestionResult"></div>
        </section>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 直搭数字衣柜</div>
  </footer>

  <script src="config.js"></script>
  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
