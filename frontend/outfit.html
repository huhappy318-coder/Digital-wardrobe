<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日穿搭 - 直搭数字衣柜</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .weather-card {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-accent) 100%);
            color: white;
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            margin-bottom: var(--spacing-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: var(--spacing-md);
            position: relative;
            overflow: hidden;
        }

        .weather-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
        }

        .temperature {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
            color: var(--color-primary); /* 橙色主题 */
        }

        .weather-info {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }

        .weather-city {
            font-size: 1.25rem;
            font-weight: 500;
        }

        .weather-condition {
            font-size: 1rem;
            opacity: 0.9;
        }

        .weather-details {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            text-align: right;
        }

        .weather-detail {
            font-size: 0.875rem;
            opacity: 0.9;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: var(--spacing-xs);
        }

        .weather-icon {
            font-size: 2rem;
            opacity: 0.9;
        }

        .weather-input-area {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            align-items: center;
        }

        .weather-input-area input {
            flex: 1;
            padding: var(--spacing-md) var(--spacing-lg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            font-family: inherit;
            color: var(--color-text-main);
            background: var(--color-surface);
            transition: all var(--transition-fast);
        }

        .weather-input-area input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-light);
        }

        .weather-input-area button {
            padding: var(--spacing-md) var(--spacing-xl);
            font-size: 1rem;
        }

        .generate-section {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .generate-btn {
            width: 100%;
            max-width: 400px;
            font-size: 1.125rem;
            padding: var(--spacing-md) var(--spacing-xl);
        }

        .loading-section {
            text-align: center;
            padding: var(--spacing-xl) 0;
            display: none;
        }

        .loading-section.active {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid var(--color-border);
            border-top: 4px solid var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: var(--spacing-md);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.125rem;
            color: var(--color-text-sub);
        }

        .outfit-result {
            margin-top: var(--spacing-xl);
            display: none;
        }

        .outfit-result.active {
            display: block;
        }

        .outfit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            flex-wrap: wrap;
            gap: var(--spacing-md);
        }

        .outfit-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--color-text-main);
        }

        .regenerate-btn {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
        }

        .outfit-combination {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
        }

        .outfit-item {
            background: var(--color-surface);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-base);
        }

        .outfit-item:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .outfit-item-image {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .outfit-item-info {
            padding: var(--spacing-sm);
            text-align: center;
        }

        .outfit-item-name {
            font-weight: 500;
            font-size: 0.875rem;
            margin-bottom: var(--spacing-xs);
        }

        .outfit-item-category {
            font-size: 0.75rem;
            color: var(--color-text-sub);
        }

        .outfit-reason {
            background: var(--color-primary-light);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-lg);
        }

        .reason-title {
            font-weight: 600;
            color: var(--color-primary);
            margin-bottom: var(--spacing-sm);
        }

        .reason-content {
            color: var(--color-text-main);
            line-height: 1.6;
        }

        .outfit-tip {
            background: var(--color-accent-light);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-lg);
            border-left: 4px solid var(--color-accent);
        }

        .tip-title {
            font-weight: 600;
            color: var(--color-accent);
            margin-bottom: var(--spacing-sm);
        }

        .tip-content {
            color: var(--color-text-main);
            line-height: 1.6;
        }

        .outfit-actions {
            text-align: center;
        }

        .outfit-actions button {
            margin: 0 var(--spacing-sm);
        }

        @media (max-width: 1024px) {
            .outfit-combination {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .weather-card {
                flex-direction: column;
                text-align: center;
            }

            .weather-main {
                flex-direction: column;
            }

            .weather-details {
                text-align: center;
                align-items: center;
            }

            .temperature {
                font-size: 2.5rem;
            }

            .location-controls {
                flex-direction: column;
            }

            .outfit-combination {
                grid-template-columns: 1fr;
            }

            .outfit-header {
                flex-direction: column;
            }

            .outfit-actions button {
                display: block;
                width: 100%;
                margin: var(--spacing-sm) 0;
            }

            .weather-input-area {
                flex-direction: column;
            }

            .weather-input-area input {
                width: 100%;
            }

            .weather-input-area button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .outfit-combination {
                grid-template-columns: 1fr;
            }

            .temperature {
                font-size: 2rem;
            }

            .weather-city {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <div class="logo-icon">C</div>
                    <span>直搭数字衣柜</span>
                </a>
                <!-- 桌面端导航 -->
                <nav class="desktop-nav">
                    <ul>
                        <li><a href="index.html">首页</a></li>
                        <li><a href="wardrobe.html">衣橱</a></li>

                <li><a href="outfit.html">今日穿搭</a></li>

    <main>
        <div class="container">
            <div id="weather-section">
                <div class="weather-input-area">
                    <input
                        type="text"
                        id="city-input"
                        placeholder="输入你的城市，如：上海、北京、成都"
                    />
                    <button id="get-recommend-btn" class="btn btn-primary">
                        ✨ 获取穿搭建议
                    </button>
                </div>

                <div id="weather-card" class="weather-card" style="display: none;">
                    <div class="weather-main">
                        <div class="weather-icon">
                            <span id="weather-emoji">☀️</span>
                        </div>
                        <div>
                            <div class="weather-city" id="weather-city">---</div>
                            <div class="weather-condition" id="weather-condition">---</div>
                        </div>
                        <div class="temperature" id="weather-temp">--°C</div>
                    </div>
                    <div class="weather-details">
                        <div class="weather-detail">
                            <span>湿度</span>
                            <span id="weather-humidity">--%</span>
                        </div>
                        <div class="weather-detail">
                            <span>体感温度</span>

            <div class="generate-section">

            </div>

            <div id="outfit-result" class="outfit-result">
                <div class="outfit-header">
                    <div class="outfit-title">今日推荐穿搭</div>
                    <button id="regenerateBtn" class="btn btn-outline regenerate-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"/>
                            <polyline points="1 20 1 14 7 14"/>
                            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>

    <script src="/static/config.js"></script>
    <script src="/static/storage.js"></script>
    <script src="/static/app.js"></script>
    <script>
        // 汉堡菜单功能
        document.addEventListener('DOMContentLoaded', function() {
            const hamburger = document.getElementById('hamburger');
            const mobileNav = document.getElementById('mobileNav');

            hamburger.addEventListener('click', function() {
                this.classList.toggle('active');
                mobileNav.classList.toggle('active');
            });

            // 点击菜单外部关闭菜单
            document.addEventListener('click', function(event) {
                if (!event.target.closest('.header-content')) {
                    hamburger.classList.remove('active');
                    mobileNav.classList.remove('active');
                }
            });
        });
    <script>
        // 显示天气信息
        function displayWeather(weatherData) {
            const weatherCard = document.getElementById('weather-card');

            // 天气图标映射
            const weatherIconMap = {
                '晴': '☀️',
                '多云': '☁️',
                '阴': '🌥️',
                '小雨': '🌦️',
                '中雨': '🌧️',
                '大雨': '⛈️',
                '暴雨': '💧',
                '雷阵雨': '⛈️',
                '雪': '❄️',
                '雾霾': '🌫️',
                '沙尘': '🌪️'
            };

            // 更新界面
            document.getElementById('weather-city').textContent = weatherData.city;
            document.getElementById('weather-temp').textContent = `${weatherData.temp}°C`;
            document.getElementById('weather-condition').textContent = weatherData.description;
            document.getElementById('weather-humidity').textContent = `${weatherData.humidity}%`;
            document.getElementById('weather-feels-like').textContent = `${weatherData.feels_like}°C`;

            // 设置天气图标
            const condition = weatherData.description;
            let emoji = '☀️';
            for (const [key, value] of Object.entries(weatherIconMap)) {
                if (condition.includes(key)) {
                    emoji = value;
                    break;
                }
            }
            document.getElementById('weather-emoji').textContent = emoji;

            // 显示天气卡片
            weatherCard.style.display = 'flex';

            // 启用生成穿搭按钮
            document.getElementById('generateOutfitBtn').disabled = false;
        }

        // 获取天气数据
        async function getWeather(city) {
            try {
                const response = await fetch(`/api/weather?city=${encodeURIComponent(city)}`);
                const data = await response.json();

                if (data.success) {
                    displayWeather(data);
                } else {
                    showNotification('未找到该城市天气，请尝试输入英文城市名或检查拼写', 'error');
                }
            } catch (error) {
                console.error('天气查询失败:', error);
                showNotification('天气查询失败，请稍后重试', 'error');
            }
        }

        // 生成穿搭推荐
        async function generateOutfitRecommendation() {
            const wardrobe = Storage.getAllClothing();

            if (wardrobe.length < 3) {
                showNotification('请先去衣橱添加至少3件衣服，再来获取穿搭建议', 'error');
                return;
            }

            // 获取天气信息
            const cityName = document.getElementById('weather-city').textContent;
            const temperature = parseInt(document.getElementById('weather-temp').textContent);
            const weatherCondition = document.getElementById('weather-condition').textContent;
            const feelsLike = parseInt(document.getElementById('weather-feels-like').textContent);

            // 显示加载状态
            document.getElementById('generateOutfitBtn').disabled = true;
            document.getElementById('generateOutfitBtn').innerHTML = `
                <span class="loading-spinner" style="width: 16px; height: 16px;"></span>
                生成中...
            `;
            document.getElementById('loading-section').classList.add('active');

            try {
                // 发送请求到后端
                const response = await fetch('/api/claude', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: [
                            {
                                'role': 'system',
                                'content': '你是一位专业的穿搭顾问，根据天气和用户衣橱推荐合适的穿搭。'
                            },
                            {
                                'role': 'user',
                                'content': `
今日天气信息：
- 城市：${cityName}
- 温度：${temperature}°C
- 天气：${weatherCondition}
- 体感温度：${feelsLike}°C

用户衣橱清单（JSON格式）：
${JSON.stringify(wardrobe, null, 2)}

请从用户衣橱中挑选最适合今日天气的搭配组合，并返回以下格式的JSON：
{
  "outfit": ["衣服ID1", "衣服ID2"],
  "reason": "今天气温适中，推荐这套轻便休闲搭配...",
  "tip": "一句穿搭小贴士"
}

注意：
1. 只返回JSON格式内容，不要包含其他文本
2. outfit数组包含2-3件衣服的ID
3. reason要说明搭配理由
4. tip是一句简洁的穿搭建议
5. 确保衣服搭配合理，适合天气条件
                        `.trim()
                            }
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const content = data.content;

                // 解析响应
                const outfitData = parseOutfitResponse(content);
                if (!outfitData) {
                    throw new Error('响应格式错误');
                }

                // 显示穿搭推荐
                displayOutfitRecommendation(outfitData);

            } catch (error) {
                console.error('穿搭推荐失败:', error);
                showNotification('AI识别暂时不可用，请稍后重试', 'error');
            } finally {
                // 恢复按钮状态
                document.getElementById('generateOutfitBtn').disabled = false;
                document.getElementById('generateOutfitBtn').innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"/>
                        <polyline points="1 20 1 14 7 14"/>
                        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                    为你推荐今日穿搭
                `;
                document.getElementById('loading-section').classList.remove('active');
            }
        }

        // 解析Claude响应
        function parseOutfitResponse(content) {
            try {
                // 移除代码块标记
                const jsonStr = content.replace(/```json|```/g, '').trim();
                const parsed = JSON.parse(jsonStr);

                if (parsed.outfit && parsed.reason) {
                    return parsed;
                }

                throw new Error('无效的响应格式');
            } catch (error) {
                console.error('解析响应失败:', error);
                return null;
            }
        }

        // 显示穿搭推荐
        function displayOutfitRecommendation(data) {
            const wardrobe = getWardrobe();

            // 获取选中的衣物信息
            const outfitItems = [];
            data.outfit.forEach(outfitId => {
                const item = wardrobe.find(clothing => clothing.id === outfitId);
                if (item) {
                    outfitItems.push(item);
                }
            });

            // 渲染搭配组合
            const combinationContainer = document.getElementById('outfit-combination');
            combinationContainer.innerHTML = '';

            outfitItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'outfit-item';
                div.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" class="outfit-item-image">
                    <div class="outfit-item-info">
                        <div class="outfit-item-name">${item.name}</div>
                        <div class="outfit-item-category">${item.category}</div>
                    </div>
                `;
                combinationContainer.appendChild(div);
            });

            // 显示搭配理由和提示
            document.getElementById('reason-content').textContent = data.reason;
            document.getElementById('tip-content').textContent = data.tip;

            // 显示结果区域
            document.getElementById('outfit-result').classList.add('active');
        }

        // 页面加载事件
        document.addEventListener('DOMContentLoaded', function() {
            // 城市输入框回车事件
            const cityInput = document.getElementById('city-input');
            cityInput.addEventListener('keypress', async (e) => {
                if (e.key === 'Enter') {
                    await getRecommend();
                }
            });

            // 获取穿搭建议按钮
            document.getElementById('get-recommend-btn').addEventListener('click', async function() {
                await getRecommend();
            });

            // 生成穿搭按钮
            document.getElementById('generateOutfitBtn').addEventListener('click', generateOutfitRecommendation);

            // 重新生成按钮
            document.getElementById('regenerateBtn').addEventListener('click', generateOutfitRecommendation);

            // 今天就穿这套按钮
            document.getElementById('wearBtn').addEventListener('click', function() {
                const wardrobe = getWardrobe();
                const outfit = []; // 这里需要获取当前显示的穿搭

                // 检查是否有显示的穿搭
                if (document.getElementById('outfit-result').classList.contains('active')) {
                    const items = document.querySelectorAll('.outfit-item');
                    items.forEach(item => {
                        const name = item.querySelector('.outfit-item-name').textContent;
                        const clothing = wardrobe.find(cl => cl.name === name);
                        if (clothing) {
                            outfit.push(clothing);
                        }
                    });
                }

                if (outfit.length > 0) {
                    outfit.forEach(clothing => {
                        Storage.updateWornCount(clothing.id);
                    });

                    alert('穿搭记录已更新');
                    // 刷新页面以显示更新后的次数
                    window.location.reload();
                } else {
                    alert('请先生成穿搭推荐');
                }
            });

            // 取消按钮
            document.getElementById('cancelBtn').addEventListener('click', function() {
                document.getElementById('outfit-result').classList.remove('active');
                document.getElementById('generateOutfitBtn').disabled = false;
            });
        });

        // 获取推荐函数
        async function getRecommend() {
            const cityName = document.getElementById('city-input').value.trim();

            if (!cityName) {
                alert('请输入城市名称');
                return;
            }

            const btn = document.getElementById('get-recommend-btn');
            btn.disabled = true;
            btn.textContent = '获取中...';

            try {
                // 获取天气数据
                const weatherResponse = await fetch(`/api/weather?city=${encodeURIComponent(cityName)}`);
                const weatherData = await weatherResponse.json();

                if (weatherData.success) {
                    displayWeather(weatherData);
                    // 自动生成穿搭推荐
                    await generateOutfitRecommendation();
                } else {
                    showNotification('未找到该城市天气，请尝试输入英文城市名或检查拼写', 'error');
                }
            } catch (error) {
                console.error('获取推荐失败:', error);
                showNotification('获取推荐失败，请稍后重试', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '✨ 获取穿搭建议';
            }
        }
    </script>
</body>
</html>
