<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>试衣间 - 直搭数字衣柜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="tryon">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html"><span class="brand-mark">搭</span><span>直搭数字衣柜</span></a>
      <nav class="desktop-nav" aria-label="主导航">
        <a class="nav-link" data-nav="home" href="index.html">首页</a>
        <a class="nav-link" data-nav="wardrobe" href="wardrobe.html">衣橱</a>
        <a class="nav-link" data-nav="outfit" href="outfit.html">今日穿搭</a>
        <a class="nav-link" data-nav="suggestion" href="suggestion.html">搭配建议</a>
        <a class="nav-link" data-nav="tryon" href="tryon.html">试衣间</a>
      </nav>
      <button class="menu-button" id="menuButton" aria-label="打开菜单" aria-expanded="false">☰</button>
    </div>
    <nav class="container mobile-nav" id="mobileNav" aria-label="移动端导航">
      <a class="nav-link" data-nav="home" href="index.html">首页</a>
      <a class="nav-link" data-nav="wardrobe" href="wardrobe.html">衣橱</a>
      <a class="nav-link" data-nav="outfit" href="outfit.html">今日穿搭</a>
      <a class="nav-link" data-nav="suggestion" href="suggestion.html">搭配建议</a>
      <a class="nav-link" data-nav="tryon" href="tryon.html">试衣间</a>
    </nav>
  </header>

  <main>
    <div class="container">
      <div class="section-head">
        <div>
          <p class="eyebrow">Try On</p>
          <h1 style="color: var(--ink); font-size: clamp(32px, 5vw, 52px);">试衣间</h1>
          <p class="subtle">快速把衣橱里的单品放到试衣板上，检查颜色和层次是否协调。</p>
        </div>
      </div>

      <section class="tryon-layout">
        <aside class="panel">
          <div class="inline-actions" style="margin-bottom: 16px;">
            <button class="btn btn-secondary" id="genderMale">男生版型</button>
            <button class="btn" id="genderFemale">女生版型</button>
          </div>
          <div class="tryon-list" id="tryonList"></div>
        </aside>

        <section class="panel tryon-stage">
          <div class="mannequin" aria-label="试衣预览">
            <div class="body-shape"></div>
            <div class="tryon-slot slot-accessory" data-slot="accessory">配饰</div>
            <div class="tryon-slot slot-outerwear" data-slot="outerwear">外套</div>
            <div class="tryon-slot slot-top" data-slot="top">上衣</div>
            <div class="tryon-slot slot-dress" data-slot="dress">连衣裙</div>
            <div class="tryon-slot slot-bottom" data-slot="bottom">下装</div>
            <div class="tryon-slot slot-shoes" data-slot="shoes">鞋履</div>
          </div>
          <div>
            <p class="eyebrow">Preview</p>
            <h2>当前试穿</h2>
            <div class="tag-row" id="wornSummary"></div>
            <p class="subtle" style="margin-top: 18px;">同一分类再次试穿会自动替换。点击“记录试穿”会增加这些单品的穿着次数。</p>
            <div class="inline-actions" style="margin-top: 18px;">
              <button class="btn btn-primary" id="recordTryon">记录试穿</button>
              <button class="btn btn-ghost" id="clearTryon">清空试衣板</button>
            </div>
          </div>
        </section>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 直搭数字衣柜</div>
  </footer>

  <script src="config.js"></script>
  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
