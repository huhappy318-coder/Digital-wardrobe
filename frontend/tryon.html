<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试衣间 - 直搭数字衣柜</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 试衣间特殊样式 */
        .tryon-container {
            display: grid;
            grid-template-columns: 35% 65%;
            gap: var(--spacing-lg);
            height: calc(100vh - 64px - 80px);
        }

        /* 左侧面板 */
        .wardrobe-panel {
            background: var(--color-surface);
            border-radius: var(--radius-xl);
            padding: var(--spacing-lg);
            overflow-y: auto;
            box-shadow: var(--shadow-md);
        }

        .gender-toggle {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
        }

        .gender-btn {
            flex: 1;
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-lg);
            background: var(--color-border);
            color: var(--color-text-sub);
            border: none;
            cursor: pointer;
            transition: all var(--transition-base);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-xs);
        }

        .gender-btn.active {
            background: var(--color-primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .wardrobe-list {
            margin-bottom: var(--spacing-lg);
            display: block;
            visibility: visible;
            opacity: 1;
        }

        .clothing-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-sm);
            background: var(--color-primary-light);
            transition: all var(--transition-base);
        }

        .clothing-item:hover {
            background: var(--color-primary-light);
            transform: translateX(4px);
        }

        .clothing-thumbnail {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: var(--color-border);
        }

        .clothing-info {
            flex: 1;
        }

        .clothing-name {
            font-weight: 500;
            margin-bottom: var(--spacing-xs);
        }

        .clothing-category {
            font-size: 0.75rem;
            color: var(--color-text-sub);
        }

        .wear-btn {
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-sm);
            background: var(--color-primary);
            color: white;
            border: none;
            cursor: pointer;
            transition: all var(--transition-base);
            font-size: 0.75rem;
        }

        .wear-btn:hover {
            background: var(--color-primary-dark);
            transform: scale(1.05);
        }

        .wear-btn.worn {
            background: var(--color-success);
        }

        /* 右侧 3D 场景 */
        .three-container {
            background: var(--color-surface);
            border-radius: var(--radius-xl);
            padding: var(--spacing-lg);
            position: relative;
            box-shadow: var(--shadow-md);
        }

        #canvas-container {
            width: 100%;
            height: calc(100% - 80px);
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--color-bg);
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .canvas-hint {
            position: absolute;
            bottom: var(--spacing-lg);
            left: 50%;
            transform: translateX(-50%);
            color: var(--color-text-sub);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .worn-items {
            position: absolute;
            bottom: var(--spacing-lg);
            left: var(--spacing-lg);
            right: var(--spacing-lg);
            display: flex;
            gap: var(--spacing-sm);
            overflow-x: auto;
            padding: var(--spacing-sm);
            background: rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-md);
            backdrop-filter: blur(10px);
        }

        .worn-tag {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-xs) var(--spacing-sm);
            background: var(--color-primary);
            color: white;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            white-space: nowrap;
        }

        .remove-tag {
            cursor: pointer;
            opacity: 0.8;
            transition: opacity var(--transition-fast);
        }

        .remove-tag:hover {
            opacity: 1;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .tryon-container {
                grid-template-columns: 1fr;
                height: auto;
            }

            .three-container {
                height: 400px;
            }

            #canvas-container {
                height: calc(400px - 80px);
            }
        }

        @media (max-width: 768px) {
            .gender-toggle {
                flex-direction: column;
            }

            .three-container {
                height: 300px;
            }

            #canvas-container {
                height: calc(300px - 80px);
            }

            .canvas-hint {
                font-size: 0.75rem;
            }

            .worn-items {
                bottom: var(--spacing-md);
                left: var(--spacing-md);
                right: var(--spacing-md);
                padding: var(--spacing-xs);
            }

            .worn-tag {
                font-size: 0.7rem;
                padding: var(--spacing-xs) var(--spacing-sm);
            }
        }
    </style>
</head>
<body>

        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <div class="logo-icon">C</div>
                    <span>ClosetAI</span>
                </a>
                <!-- 桌面端导航 -->
                <nav class="desktop-nav">
                    <ul>
                        <li><a href="index.html">首页</a></li>
                        <li><a href="wardrobe.html">衣橱</a></li>
                        <li><a href="outfit.html">今日穿搭</a></li>

            </div>
        </div>
        <!-- 手机端导航菜单 -->
        <div class="mobile-nav" id="mobileNav">
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="wardrobe.html">衣橱</a></li>
                <li><a href="outfit.html">今日穿搭</a></li>

    </header>

    <main>
        <div class="container">
            <div class="tryon-container">
                <!-- 左侧面板 -->
                <div class="wardrobe-panel">
                    <div class="gender-toggle">
                        <button class="gender-btn active" id="maleBtn">
                            👔 男生
                        </button>
                        <button class="gender-btn" id="femaleBtn">
                            👗 女生
                        </button>
                    </div>

                    <div class="wardrobe-list" id="wardrobeList">

                <div class="three-container">
                    <div id="canvas-container">

                    </div>

                    <div class="canvas-hint">
                        ← 拖动旋转 →
                    </div>

                    <div class="worn-items" id="wornItems">

                    <div id="loading-tip" style="position: absolute; top: var(--spacing-lg); left: 50%; transform: translateX(-50%); color: var(--color-text-sub); font-size: 0.875rem;"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="text-center">
                <p class="text-muted">© 2026 ClosetAI. 智能衣橱管理系统.</p>
            </div>
        </div>

    <script src="/static/config.js"></script>
    <script src="/static/storage.js"></script>
    <script src="/static/app.js"></script>
    <script>
        // 汉堡菜单功能
        document.addEventListener('DOMContentLoaded', function() {
            const hamburger = document.getElementById('hamburger');
            const mobileNav = document.getElementById('mobileNav');

            hamburger.addEventListener('click', function() {

            // 点击菜单外部关闭菜单
            document.addEventListener('click', function(event) {
                if (!event.target.closest('.header-content')) {
                    hamburger.classList.remove('active');
                    mobileNav.classList.remove('active');
                }
            });
        });
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
            "three/examples/jsm/controls/OrbitControls": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/controls/OrbitControls.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/loaders/FBXLoader": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/loaders/FBXLoader.js"
        }
    }
    </script>
    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';
    import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
    import { FBXLoader } from 'three/examples/jsm/loaders/FBXLoader';

    // 页面加载事件
    document.addEventListener('DOMContentLoaded', function() {
        // 初始化存储
        if (typeof initStorage === 'function') {
            initStorage();
        }
        // 初始化场景
        initThreeScene();

        // 加载衣橱数据
        displayWardrobe();

        // 性别切换
        document.getElementById('maleBtn').addEventListener('click', function() {
            this.classList.add('active');
            document.getElementById('femaleBtn').classList.remove('active');
            // 切换模特性别
            changeModelGender('male');
        });

        document.getElementById('femaleBtn').addEventListener('click', function() {
            this.classList.add('active');
            document.getElementById('maleBtn').classList.remove('active');
            // 切换模特性别
            changeModelGender('female');
        });

        // 清空按钮
        document.getElementById('clearBtn').addEventListener('click', function() {
            if (confirm('确定要清空所有衣物吗？')) {
                clearAllClothing();
                clearAllWornItems();
            }
        });
    });

    // 场景变量
    let scene, camera, renderer, controls;
    let currentGender = 'male';
    let modelGroup;
    let maleModel, femaleModel;
    // 存储已穿着的衣服网格
    const wornMeshes = {};
    // 导出OrbitControls到window对象，方便测试
    window.controls = null;

    function initThreeScene() {
        const container = document.getElementById('canvas-container');
        const canvas = document.getElementById('renderCanvas');

        // 场景
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xFFF8F4);

        // 相机
        camera = new THREE.PerspectiveCamera(
            45,
            container.clientWidth / container.clientHeight,
            0.1,
            1000
        );
        camera.position.z = 5;

        // 渲染器
        renderer = new THREE.WebGLRenderer({
            canvas: canvas,
            antialias: true
        });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        // 轨道控制
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.minPolarAngle = Math.PI / 3;
        controls.maxPolarAngle = Math.PI / 1.5;
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.8;
        // 导出到window对象，方便测试
        window.controls = controls;

        // 创建模型组
        modelGroup = new THREE.Group();
        scene.add(modelGroup);

        // 加载模型
        loadModels();

        // 窗口大小调整
        window.addEventListener('resize', function() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    }

    function loadModels() {
        const loader = new FBXLoader();

        // 加载男性模型
        loader.load('/static/assets/models/male.fbx', function(model) {
            maleModel = model;
            maleModel.scale.set(0.01, 0.01, 0.01); // 调整比例
            maleModel.position.set(0, -1, 0);
            maleModel.visible = true;
            modelGroup.add(maleModel);

            // 计算模型包围盒
            const box = new THREE.Box3().setFromObject(maleModel);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            // 根据包围盒计算各部位Y坐标
            window.modelMetrics = {
                totalHeight: size.y,
                topY: box.max.y,
                bottomY: box.min.y,
                centerX: center.x,
                centerZ: center.z,
                width: size.x,
                // 各部位比例（基于真实人体比例）
                headTop: box.max.y,
                shoulderY: box.max.y - size.y * 0.18,
                chestY: box.max.y - size.y * 0.28,
                waistY: box.max.y - size.y * 0.42,
                hipY: box.max.y - size.y * 0.52,
                kneeY: box.max.y - size.y * 0.72,
                ankleY: box.min.y + size.y * 0.08,
            };

            console.log('男性模型尺寸:', size);
            console.log('各部位坐标:', window.modelMetrics);

            // 打印模型节点信息
            console.log('男性模型节点：');
            maleModel.traverse(child => {
                console.log(child.name);
            });
        }, undefined, function(error) {
            console.error('本地模型加载失败:', error);
            document.getElementById('loading-tip').innerHTML =
                '模型加载失败，请确认文件存在于 frontend/assets/models/ 目录';
            // 加载失败时创建简单几何体作为 fallback
            createFallbackModel('male');
        });

        // 加载女性模型
        loader.load('/static/assets/models/female.fbx', function(model) {
            femaleModel = model;
            femaleModel.scale.set(0.01, 0.01, 0.01); // 调整比例
            femaleModel.position.set(0, -1, 0);
            femaleModel.visible = false;
            modelGroup.add(femaleModel);

            // 计算模型包围盒
            const box = new THREE.Box3().setFromObject(femaleModel);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            // 根据包围盒计算各部位Y坐标
            window.modelMetrics = {
                totalHeight: size.y,
                topY: box.max.y,
                bottomY: box.min.y,
                centerX: center.x,
                centerZ: center.z,
                width: size.x,
                // 各部位比例（基于真实人体比例）
                headTop: box.max.y,
                shoulderY: box.max.y - size.y * 0.18,
                chestY: box.max.y - size.y * 0.28,
                waistY: box.max.y - size.y * 0.42,
                hipY: box.max.y - size.y * 0.52,
                kneeY: box.max.y - size.y * 0.72,
                ankleY: box.min.y + size.y * 0.08,
            };

            console.log('女性模型尺寸:', size);
            console.log('各部位坐标:', window.modelMetrics);

            // 打印模型节点信息
            console.log('女性模型节点：');
            femaleModel.traverse(child => {
                console.log(child.name);
            });
        }, undefined, function(error) {
            console.error('本地模型加载失败:', error);
            document.getElementById('loading-tip').innerHTML =
                '模型加载失败，请确认文件存在于 frontend/assets/models/ 目录';
            // 加载失败时创建简单几何体作为 fallback
            createFallbackModel('female');
        });
    }

    function createFallbackModel(gender) {
        // 如果模型加载失败，创建几何体模型作为替代
        const skinMaterial = new THREE.MeshLambertMaterial({
            color: 0xE8D5C4
        });

        const torsoWidth = gender === 'male' ? 0.55 : 0.45;

        const model = new THREE.Group();

        // 头部
        const headGeometry = new THREE.SphereGeometry(0.25);
        const head = new THREE.Mesh(headGeometry, skinMaterial);
        head.position.y = 1.6;
        model.add(head);

        // 面部模糊
        const blurGeometry = new THREE.SphereGeometry(0.26);
        const blurMaterial = new THREE.MeshLambertMaterial({
            color: 0xAAAAAA,
            transparent: true,
            opacity: 0.3
        });
        const blur = new THREE.Mesh(blurGeometry, blurMaterial);
        blur.position.y = 1.6;
        model.add(blur);

        // 躯干
        const torsoGeometry = new THREE.BoxGeometry(torsoWidth, 0.6, 0.25);
        const torso = new THREE.Mesh(torsoGeometry, skinMaterial);
        torso.position.y = 0.9;
        model.add(torso);

        // 简单的四肢
        const armGeometry = new THREE.CylinderGeometry(0.07, 0.06, 0.5);
        const leftArm = new THREE.Mesh(armGeometry, skinMaterial);
        leftArm.position.set(-torsoWidth/2 - 0.12, 1.1, 0);
        leftArm.rotation.z = Math.PI / 6;
        model.add(leftArm);

        const rightArm = new THREE.Mesh(armGeometry, skinMaterial);
        rightArm.position.set(torsoWidth/2 + 0.12, 1.1, 0);
        rightArm.rotation.z = -Math.PI / 6;
        model.add(rightArm);

        const legGeometry = new THREE.CylinderGeometry(0.1, 0.08, 0.6);
        const leftLeg = new THREE.Mesh(legGeometry, skinMaterial);
        leftLeg.position.set(-0.1, 0.2, 0);
        leftLeg.rotation.z = Math.PI / 12;
        model.add(leftLeg);

        const rightLeg = new THREE.Mesh(legGeometry, skinMaterial);
        rightLeg.position.set(0.1, 0.2, 0);
        rightLeg.rotation.z = -Math.PI / 12;
        model.add(rightLeg);

        model.scale.set(1, 1, 1);
        model.position.set(0, -1, 0);
        model.visible = (gender === 'male');
        modelGroup.add(model);

        // 保存到相应变量
        if (gender === 'male') {
            maleModel = model;
        } else {
            femaleModel = model;
        }

        // 计算模型包围盒
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());

        // 根据包围盒计算各部位Y坐标
        window.modelMetrics = {
            totalHeight: size.y,
            topY: box.max.y,
            bottomY: box.min.y,
            centerX: center.x,
            centerZ: center.z,
            width: size.x,
            // 各部位比例（基于真实人体比例）
            headTop: box.max.y,
            shoulderY: box.max.y - size.y * 0.18,
            chestY: box.max.y - size.y * 0.28,
            waistY: box.max.y - size.y * 0.42,
            hipY: box.max.y - size.y * 0.52,
            kneeY: box.max.y - size.y * 0.72,
            ankleY: box.min.y + size.y * 0.08,
        };

        console.log('Fallback模型尺寸:', size);
        console.log('各部位坐标:', window.modelMetrics);
    }

    function changeModelGender(gender) {
        if (currentGender === gender) return;

        // 隐藏当前模型
        if (currentGender === 'male' && maleModel) {
            maleModel.visible = false;
        } else if (currentGender === 'female' && femaleModel) {
            femaleModel.visible = false;
        }

        currentGender = gender;

        // 更新按钮的active状态
        if (gender === 'male') {
            document.getElementById('maleBtn').classList.add('active');
            document.getElementById('femaleBtn').classList.remove('active');
        } else {
            document.getElementById('maleBtn').classList.remove('active');
            document.getElementById('femaleBtn').classList.add('active');
        }

        // 显示新模型
        if (gender === 'male') {
            if (maleModel) {
                maleModel.visible = true;
            } else {
                createFallbackModel('male');
            }
        } else {
            if (femaleModel) {
                femaleModel.visible = true;
            } else {
                createFallbackModel('female');
            }
        }

        // 清空所有已穿着衣服
        clearAllClothing();
        // 清空已穿着列表
        localStorage.removeItem('worn_items');
        updateWornItems();
        updateWearButtons();

        showNotification('模特性别已切换', 'success');
    }

    function displayWardrobe() {
        // 确保initStorage函数被调用
        if (typeof initStorage === 'function') {
            initStorage();
        }
        const wardrobe = Storage.getAllClothing();
        const list = document.getElementById('wardrobeList');

        // 确保衣橱列表可见
        list.style.display = 'block';
        list.style.visibility = 'visible';
        list.style.opacity = '1';

        if (wardrobe.length === 0) {
            list.innerHTML = `
                <div style="text-align: center; padding: var(--spacing-xl); color: var(--color-text-sub);">
                    <div style="width: 64px; height: 64px; background: var(--color-primary-light); border-radius: var(--radius-xl); display: flex; align-items: center; justify-content: center; margin: 0 auto var(--spacing-md);">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"/>
                            <rect x="14" y="3" width="7" height="7"/>
                            <rect x="14" y="14" width="7" height="7"/>
                            <rect x="3" y="14" width="7" height="7"/>
                        </svg>
                    </div>
                    <p>衣橱是空的</p>
                    <p class="text-sm">先去衣橱添加一些衣服吧！</p>
                </div>
            `;
            return;
        }

        list.innerHTML = wardrobe.map(item => {
            const itemStr = JSON.stringify(item).replace(/"/g, '&quot;');
            return `
            <div class="clothing-item">
                <img src="${item.image || 'placeholder.svg'}" alt="${item.name}" class="clothing-thumbnail">
                <div class="clothing-info">
                    <div class="clothing-name">${item.name}</div>
                    <div class="clothing-category">${item.category}</div>
                </div>
                <button class="wear-btn" onclick="wearClothing(${itemStr})">
                    穿上
                </button>
            </div>
        `;
        }).join('');
    }

    // 导出函数到window对象上，以便测试脚本访问
    window.displayWardrobe = displayWardrobe;
    window.wearClothing = wearClothing;
    window.removeClothing = removeClothing;
    window.clearAllClothing = clearAllClothing;
    window.changeModelGender = changeModelGender;
    window.initThreeScene = initThreeScene;

    function wearClothing(item) {
        const m = window.modelMetrics;
        if (!m) {
            alert('模特还在加载中，请稍等');
            return;
        }

        // 如果该部位已有衣服，先移除
        if (wornMeshes[item.category]) {
            scene.remove(wornMeshes[item.category]);
        }

        // 颜色映射
        const colorMap = {
            '黑色': 0x2D2D2D, '白色': 0xF5F5F5, '红色': 0xE53E3E,
            '蓝色': 0x4A6FA5, '绿色': 0x48BB78, '黄色': 0xECC94B,
            '粉色': 0xFC8181, '灰色': 0xA0AEC0, '棕色': 0x8B6914,
            '紫色': 0x805AD5, '橙色': 0xFF6B2C, '卡其': 0xC3A96E,
        };

        // 找到最匹配的颜色
        let meshColor = 0xCBD5E0;
        for (const [key, val] of Object.entries(colorMap)) {
            if (item.color && item.color.includes(key)) {
                meshColor = val;
                break;
            }
        }

        const material = new THREE.MeshLambertMaterial({
            color: meshColor,
            transparent: true,
            opacity: 0.85,
        });

        let geometry, mesh, posY;
        const w = m.width;

        switch(item.category) {
            case '上衣':
                geometry = new THREE.BoxGeometry(w * 1.05, m.shoulderY - m.waistY, w * 0.55);
                posY = (m.shoulderY + m.waistY) / 2;
                break;
            case '外套':
                geometry = new THREE.BoxGeometry(w * 1.15, m.shoulderY - m.hipY, w * 0.6);
                posY = (m.shoulderY + m.hipY) / 2;
                break;
            case '裤子':
                geometry = new THREE.BoxGeometry(w * 0.95, m.hipY - m.ankleY, w * 0.5);
                posY = (m.hipY + m.ankleY) / 2;
                break;
            case '裙子':
                geometry = new THREE.CylinderGeometry(w * 0.4, w * 0.55, m.hipY - m.ankleY, 8);
                posY = (m.hipY + m.ankleY) / 2;
                break;
            case '鞋子':
                geometry = new THREE.BoxGeometry(w * 0.35, m.totalHeight * 0.06, w * 0.4);
                posY = m.ankleY - m.totalHeight * 0.03;
                break;
            default:
                geometry = new THREE.BoxGeometry(w * 0.3, w * 0.3, w * 0.3);
                posY = m.shoulderY;
        }

        mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(m.centerX, posY, m.centerZ);
        scene.add(mesh);
        wornMeshes[item.category] = mesh;

        // 更新底部已穿着标签
        updateWornTags();
    }

    // 脱下某件衣服
    function removeClothing(category) {
        if (wornMeshes[category]) {
            scene.remove(wornMeshes[category]);
            delete wornMeshes[category];
            updateWornTags();
        }
    }

    // 更新底部标签栏
    function updateWornTags() {
        const container = document.getElementById('wornItems');
        container.innerHTML = '';
        Object.entries(wornMeshes).forEach(([category, mesh]) => {
            const tag = document.createElement('span');
            tag.className = 'worn-tag';
            tag.innerHTML = category + ' <span onclick="removeClothing(\'' + category + '\')">✕</span>';
            container.appendChild(tag);
        });

        if (Object.keys(wornMeshes).length === 0) {
            container.innerHTML = `
                <div style="color: var(--color-text-sub); font-size: 0.75rem;">
                    未穿着任何衣物
                </div>
            `;
        }
    }

    // 清空所有已穿着衣服
    function clearAllClothing() {
        Object.keys(wornMeshes).forEach(cat => {
            scene.remove(wornMeshes[cat]);
            delete wornMeshes[cat];
        });
        updateWornTags();
    }

    function updateWearButtons() {
        const wornItems = JSON.parse(localStorage.getItem('worn_items') || '[]');
        document.querySelectorAll('.wear-btn').forEach(btn => {
            // 这里需要根据实际的事件绑定来更新，暂时简化处理
        });
    }

    function clearAllWornItems() {
        localStorage.removeItem('worn_items');
        updateWornItems();
        updateWearButtons();
        showNotification('已清空所有衣物', 'success');
    }

    function updateWornItems() {
        const wornItems = JSON.parse(localStorage.getItem('worn_items') || '[]');
        const container = document.getElementById('wornItems');
        const wardrobe = Storage.getAllClothing();

        if (wornItems.length === 0) {
            container.innerHTML = `
                <div style="color: var(--color-text-sub); font-size: 0.75rem;">
                    未穿着任何衣物
                </div>
            `;
            return;
        }

        const items = wornItems.map(id => {
            const clothing = wardrobe.find(item => item.id === id);
            return clothing ? `
                <div class="worn-tag">
                    ${clothing.name}
                    <span class="remove-tag" onclick="removeClothing('${id}')">×</span>
                </div>
            ` : '';
        }).join('');

        container.innerHTML = items;
    }

    </script>
</body>
</html>
