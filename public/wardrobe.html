<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>衣橱管理 - 直搭数字衣柜</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 整体布局 */
        .wardrobe-container {
            display: grid;
            grid-template-columns: 40% 60%;
            gap: var(--spacing-lg);
            height: calc(100vh - 64px - 80px);
        }

        /* 上传区域 */
        .upload-area {
            border: 2px dashed var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            text-align: center;
            transition: all var(--transition-base);
            cursor: pointer;
            background: var(--color-surface);
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .upload-area:hover {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
        }

        .upload-area.dragover {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
            transform: translateY(-4px);
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto var(--spacing-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-text-sub);
            transition: color var(--transition-base);
        }

        .upload-area:hover .upload-icon {
            color: var(--color-primary);
        }

        .upload-text {
            font-size: 1.125rem;
            font-weight: 500;
            color: var(--color-text-main);
            margin-bottom: var(--spacing-sm);
        }

        .upload-hint {
            font-size: 0.875rem;
            color: var(--color-text-sub);
        }

        .preview-container {
            margin-top: var(--spacing-lg);
            display: none;
        }

        .preview-container.active {
            display: block;
        }

        .preview-image {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-md);
        }

        .upload-controls {
            margin-top: var(--spacing-lg);
        }

        .upload-btn {
            width: 100%;
        }

        .analysis-result {
            margin-top: var(--spacing-lg);
            background: var(--color-primary-light);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            display: none;
        }

        .analysis-result.active {
            display: block;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-sm) 0;
            border-bottom: 1px solid var(--color-border);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 500;
            color: var(--color-text-main);
        }

        .result-value {
            color: var(--color-primary);
            font-weight: 500;
        }

        /* 衣橱展示 */
        .wardrobe-display {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .wardrobe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }

        .wardrobe-filter {
            display: flex;
            gap: var(--spacing-sm);
            align-items: center;
        }

        .wardrobe-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-md);
            overflow-y: auto;
            padding: var(--spacing-sm);
        }

        .clothing-card {
            background: var(--color-surface);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-base);
            position: relative;
            cursor: pointer;
        }

        .clothing-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .clothing-card.selected {
            border: 2px solid var(--color-primary);
            transform: scale(1.05);
            box-shadow: var(--shadow-lg);
        }

        .select-checkbox {
            position: absolute;
            top: var(--spacing-xs);
            left: var(--spacing-xs);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--color-border);
            background: white;
            cursor: pointer;
            transition: all var(--transition-base);
            z-index: 10;
        }

        .clothing-card.selected .select-checkbox {
            background: var(--color-primary);
            border-color: var(--color-primary);
        }

        .clothing-card.selected .select-checkbox::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
        }

        .clothing-image {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: var(--color-border);
            border-radius: var(--radius-lg);
            transition: transform var(--transition-base);
        }

        .clothing-card:hover .clothing-image {
            transform: scale(1.03);
        }

        .clothing-info {
            padding: var(--spacing-sm);
            position: relative;
        }

        .clothing-name {
            font-weight: 500;
            font-size: 0.875rem;
            margin-bottom: var(--spacing-xs);
            color: var(--color-text-main);
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        .clothing-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--color-text-sub);
        }

        .worn-count-badge {
            position: absolute;
            top: var(--spacing-sm);
            right: var(--spacing-sm);
            background: var(--color-primary);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            box-shadow: var(--shadow-sm);
        }

        .delete-btn {
            position: absolute;
            top: var(--spacing-xs);
            right: var(--spacing-xs);
            background: rgba(231, 76, 60, 0.9);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.75rem;
            display: none;
            z-index: 10;
        }

        .clothing-card:hover .delete-btn {
            display: block;
        }

        .delete-btn:hover {
            background: rgba(231, 76, 60, 1);
        }

        /* 搭配工作台 */
        .outfit-builder {
            margin-top: var(--spacing-xl);
            background: var(--color-primary-light);
            padding: var(--spacing-lg);
            border-radius: var(--radius-lg);
        }

        .outfit-builder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-md);
        }

        .selected-clothing {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
            overflow-x: auto;
            padding: var(--spacing-sm);
        }

        .selected-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-xs) var(--spacing-sm);
            background: white;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
        }

        .remove-item {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--color-border);
            cursor: pointer;
            font-size: 10px;
            color: var(--color-text-sub);
            transition: all var(--transition-base);
        }

        .remove-item:hover {
            background: var(--color-primary);
            color: white;
        }

        .builder-controls {
            display: flex;
            gap: var(--spacing-sm);
            justify-content: center;
        }

        /* 分析结果 */
        .analysis-result {
            margin-top: var(--spacing-lg);
            padding: var(--spacing-lg);
            background: white;
            border-radius: var(--radius-md);
            display: none;
        }

        .analysis-result.active {
            display: block;
        }

        .score-display {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(var(--color-primary) 0deg, var(--color-primary) 306deg, var(--color-border) 306deg, var(--color-border) 360deg);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            animation: scoreAnimate 1s ease-in-out;
        }

        @keyframes scoreAnimate {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .score-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .score-label {
            position: absolute;
            bottom: 15px;
            font-size: 0.75rem;
            color: var(--color-text-sub);
        }

        .analysis-content {
            margin-bottom: var(--spacing-md);
        }

        .color-analysis {
            margin-bottom: var(--spacing-md);
            line-height: 1.6;
            color: var(--color-text-main);
        }

        .pros-cons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
        }

        .pros, .cons {
            padding: var(--spacing-md);
            border-radius: var(--radius-sm);
        }

        .pros {
            background: #f0fff4;
            border-left: 3px solid var(--color-success);
        }

        .cons {
            background: #fff5f5;
            border-left: 3px solid #fc8181;
        }

        .pros h4, .cons h4 {
            margin-bottom: var(--spacing-sm);
            font-size: 0.875rem;
            font-weight: 600;
        }

        .pros ul, .cons ul {
            list-style: none;
            padding: 0;
        }

        .pros li, .cons li {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            margin-bottom: var(--spacing-xs);
            font-size: 0.75rem;
            line-height: 1.4;
        }

        .pros li::before {
            content: '✓';
            color: var(--color-success);
            font-weight: 700;
        }

        .cons li::before {
            content: '✗';
            color: #fc8181;
            font-weight: 700;
        }

        .suggestion {
            background: var(--color-primary-light);
            padding: var(--spacing-md);
            border-radius: var(--radius-sm);
            margin-bottom: var(--spacing-md);
            border-left: 3px solid var(--color-primary);
        }

        .suggestion h4 {
            margin-bottom: var(--spacing-sm);
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-primary);
        }

        .suggestion p {
            font-size: 0.75rem;
            line-height: 1.6;
            color: var(--color-text-main);
        }

        .occasion {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }

        .occasion-tag {
            padding: var(--spacing-xs) var(--spacing-sm);
            background: var(--color-tag-bg);
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            color: var(--color-text-sub);
            transition: all var(--transition-base);
        }

        .occasion-tag:hover {
            background: var(--color-primary);
            color: white;
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .wardrobe-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .wardrobe-container {
                grid-template-columns: 1fr;
                height: auto;
            }

            .wardrobe-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .upload-area {
                height: auto;
                min-height: 300px;
            }

            .wardrobe-header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--spacing-md);
            }

            .wardrobe-filter {
                width: 100%;
            }

            .wardrobe-filter select {
                width: 100%;
            }

            .outfit-builder-header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--spacing-md);
            }

            .selected-clothing {
                justify-content: flex-start;
            }

            .builder-controls {
                flex-direction: column;
            }

            .builder-controls button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .wardrobe-grid {
                grid-template-columns: 1fr;
            }

            .upload-area {
                padding: var(--spacing-lg);
            }

            .upload-text {
                font-size: 1rem;
            }

            .upload-hint {
                font-size: 0.75rem;
            }

            .analysis-result {
                padding: var(--spacing-md);
            }

            .result-item {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--spacing-xs);
            }

            .result-item select,
            .result-item input {
                width: 100% !important;
            }
        }
    </style>
</head>

        <div class="container">

    <main>
        <div class="container">
            <div class="wardrobe-container">
                <!-- 左侧：上传区域 -->
                <div class="upload-section">
                    <div class="upload-area" id="uploadArea">
                        <input type="file" id="fileInput" accept="image/*" style="display: none;">

                        <div class="upload-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M17 19.5V14.5a3 3 0 00-3-3h-1a3 3 0 00-3 3v5"/>
                                <path d="M9 14.5a3 3 0 116 0v5"/>
                                <path d="M12 17h.01"/>
                                <path d="M21 15v-4a1 1 0 00-1-1h-1a1 1 0 00-1 1v4h-3v-6a1 1 0 00-1-1H9a1 1 0 00-1 1v6H5v-4a1 1 0 00-1-1H3a1 1 0 00-1 1v4a2 2 0 002 2h16a2 2 0 002-2z"/>
                            </svg>
                        </div>

                        <div class="upload-text">点击上传或拖拽图片</div>
                        <div class="upload-hint">支持 JPG、PNG、GIF 格式，不超过 10MB</div>

                        <div class="preview-container" id="previewContainer">
                            <img id="previewImage" class="preview-image" src="" alt="预览">
                            <div class="upload-controls">
                                <button id="analyzeBtn" class="btn btn-primary upload-btn">
                                    开始识别
                                </button>
                            </div>
                        </div>

                        <div class="analysis-result" id="analysisResult">
                            <h4 style="margin-bottom: var(--spacing-md); color: var(--color-primary);">识别结果</h4>
                            <div class="result-item">
                                <span class="result-label">类别:</span>
                                <select id="categorySelect" class="select-field" style="width: 120px;">
                                    <option value="上衣">上衣</option>
                                    <option value="裤子">裤子</option>
                                    <option value="裙子">裙子</option>
                                    <option value="外套">外套</option>
                                    <option value="鞋子">鞋子</option>
                                    <option value="配件">配件</option>
                                </select>
                            </div>
                            <div class="result-item">
                                <span class="result-label">颜色:</span>
                                <input type="text" id="colorInput" class="input-field" style="width: 120px;">
                            </div>
                            <div class="result-item">
                                <span class="result-label">风格:</span>
                                <select id="styleSelect" class="select-field" style="width: 120px;">
                                    <option value="休闲">休闲</option>
                                    <option value="正式">正式</option>
                                    <option value="运动">运动</option>
                                    <option value="优雅">优雅</option>
                                    <option value="街头">街头</option>
                                </select>
                            </div>
                            <div class="result-item">
                                <span class="result-label">季节:</span>
                                <select id="seasonSelect" class="select-field" style="width: 120px;">
                                    <option value="春">春</option>
                                    <option value="夏">夏</option>
                                    <option value="秋">秋</option>
                                    <option value="冬">冬</option>
                                    <option value="全年">全年</option>
                                </select>
                            </div>
                            <div class="result-item">
                                <span class="result-label">名称:</span>
                                <input type="text" id="nameInput" class="input-field" style="width: 120px;">
                            </div>
                            <div style="margin-top: var(--spacing-md);">
                                <button id="saveBtn" class="btn btn-primary upload-btn">
                                    加入衣橱
                                </button>
                            </div>
                        </div>

                        <div class="loading-container" id="loadingContainer" style="display: none;">
                            <div class="loading-spinner"></div>
                            <div class="loading-text">AI 正在分析你的衣服...</div>
                        </div>
                    </div>
                </div>

                <!-- 右侧：衣橱展示 -->
                <div class="wardrobe-display">
                    <div class="wardrobe-header">
                        <h2>我的衣橱</h2>
                        <div class="wardrobe-filter">
                            <select id="category-filter" class="select-field" style="width: 120px;">
                                <option value="all">全部</option>
                                <option value="上衣">上衣</option>
                                <option value="裤子">裤子</option>
                                <option value="裙子">裙子</option>
                                <option value="外套">外套</option>
                                <option value="鞋子">鞋子</option>
                                <option value="配件">配件</option>
                            </select>
                        </div>
                    </div>

                    <div id="wardrobe-grid" class="wardrobe-grid">
                        <!-- 衣橱内容将在这里动态生成 -->
                    </div>

                    <!-- 搭配工作台 -->
                    <div class="outfit-builder">
                        <div class="outfit-builder-header">
                            <h3>搭配工作台</h3>
                            <div id="selection-count">已选择 0 件</div>
                        </div>

                        <div id="selected-clothing" class="selected-clothing">
                            <!-- 选中的衣物将在这里显示 -->
                        </div>

                        <div class="builder-controls">
                            <button id="clear-selection" class="btn btn-outline">
                                清除选择
                            </button>
                            <button id="analyze-outfit" class="btn btn-primary" disabled>
                                AI 搭配分析
                            </button>
                        </div>

                        <!-- 分析结果 -->
                        <div id="analysis-result" class="analysis-result">
                            <div class="score-display">
                                <div class="score-circle" id="score-circle">
                                    <div class="score-value" id="score-value">0</div>
                                    <div class="score-label">搭配得分</div>
                                </div>

                            <div class="analysis-content">
                                <div class="color-analysis" id="colorAnalysis">
                                    <!-- 色彩分析将在这里显示 -->
                                </div>

                                <div class="pros-cons">
                                    <div class="pros">
                                        <h4>优点</h4>
                                        <ul id="prosList">
                                            <!-- 优点将在这里显示 -->
                                        </ul>
                                    </div>
                                    <div class="cons">
                                        <h4>缺点</h4>
                                        <ul id="consList">
                                            <!-- 缺点将在这里显示 -->
                                        </ul>
                                    </div>
                                </div>

                                <div class="suggestion">
                                    <h4>搭配建议</h4>
                                    <p id="suggestionText">
                                        <!-- 详细建议将在这里显示 -->
                                    </p>
                                </div>

                                <div class="occasion">
                                    <h4 style="margin-bottom: var(--spacing-sm);">适合场合</h4>
                                    <div id="occasionTags">
                                        <!-- 场合标签将在这里显示 -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

                <p class="text-muted">© 2026 直搭数字衣柜. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <script>
        // 汉堡菜单功能
        document.addEventListener('DOMContentLoaded', function() {
            const hamburger = document.getElementById('hamburger');
            const mobileNav = document.getElementById('mobileNav');

            hamburger.addEventListener('click', function() {
                this.classList.toggle('active');
                mobileNav.classList.toggle('active');
            });

            // 点击菜单外部关闭菜单
            document.addEventListener('click', function(event) {
                if (!event.target.closest('.header-content')) {
                    hamburger.classList.remove('active');
                    mobileNav.classList.remove('active');
                }
            });
        });
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            displayWardrobe();

            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const previewContainer = document.getElementById('previewContainer');
            const previewImage = document.getElementById('previewImage');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const analysisResult = document.getElementById('analysisResult');
            const loadingContainer = document.getElementById('loadingContainer');
            const saveBtn = document.getElementById('saveBtn');
            const categoryFilter = document.getElementById('category-filter');
            const clearSelectionBtn = document.getElementById('clear-selection');
            const analyzeOutfitBtn = document.getElementById('analyze-outfit');
            const selectedClothingContainer = document.getElementById('selected-clothing');
            const selectionCount = document.getElementById('selection-count');

            // 点击上传
            uploadArea.addEventListener('click', function() {
                fileInput.click();
            });

            // 文件选择
            fileInput.addEventListener('change', function(e) {
                if (e.target.files && e.target.files[0]) {
                    const file = e.target.files[0];

                    // 检查是否为图片文件
                    const allowedTypes = ['image/jpeg', 'image/png', 'image/webp', 'image/jpg'];
                    if (!allowedTypes.includes(file.type)) {
                        showNotification('请上传图片格式文件（JPG/PNG/WEBP）', 'error');
                        e.target.value = '';
                        return;
                    }

                    // 检查图片大小
                    const maxSize = 5 * 1024 * 1024; // 5MB
                    if (file.size > maxSize) {
                        showNotification('图片过大，请压缩后上传', 'error');
                        e.target.value = '';
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = function(e) {
                        previewImage.src = e.target.result;
                        previewContainer.classList.add('active');
                        analysisResult.classList.remove('active');
                    };
                    reader.readAsDataURL(file);
                }
            });

            // 拖拽上传
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');

                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    const file = e.dataTransfer.files[0];

                    // 检查是否为图片文件
                    const allowedTypes = ['image/jpeg', 'image/png', 'image/webp', 'image/jpg'];
                    if (!allowedTypes.includes(file.type)) {
                        showNotification('请上传图片格式文件（JPG/PNG/WEBP）', 'error');
                        return;
                    }

                    // 检查图片大小
                    const maxSize = 5 * 1024 * 1024; // 5MB
                    if (file.size > maxSize) {
                        showNotification('图片过大，请压缩后上传', 'error');
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = function(e) {
                        previewImage.src = e.target.result;
                        previewContainer.classList.add('active');
                        analysisResult.classList.remove('active');
                    };
                    reader.readAsDataURL(file);
                }
            });

            // 开始识别
            analyzeBtn.addEventListener('click', function() {
                const imageData = previewImage.src.split(',')[1]; // base64 data
                analyzeImage(imageData);
            });

            // 保存到衣橱
            saveBtn.addEventListener('click', function() {
                saveClothing();
            });

            // 分类筛选
            categoryFilter.addEventListener('change', displayWardrobe);

            // 清除选择
            clearSelectionBtn.addEventListener('click', clearSelection);

            // 分析搭配
            analyzeOutfitBtn.addEventListener('click', analyzeOutfit);
        });

        // 选中/取消选中衣物
        let selectedItems = [];

        function selectItem(id) {
            const index = selectedItems.indexOf(id);
            if (index > -1) {
                selectedItems.splice(index, 1);
            } else {
                selectedItems.push(id);
            }

            updateSelection();
        }

        function updateSelection() {
            const selectedCount = document.getElementById('selection-count');
            const selectedContainer = document.getElementById('selected-clothing');
            const analyzeBtn = document.getElementById('analyze-outfit');

            selectedCount.textContent = `已选择 ${selectedItems.length} 件`;
            analyzeBtn.disabled = selectedItems.length < 2 || selectedItems.length > 5;

            // 更新选中状态
            document.querySelectorAll('.clothing-card').forEach(card => {
                const id = card.dataset.id;
                if (selectedItems.includes(id)) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });

            // 更新选中列表
            const wardrobe = Storage.getAllClothing();
            const selectedClothing = wardrobe.filter(item => selectedItems.includes(item.id));

            selectedContainer.innerHTML = selectedClothing.map(item => `
                <div class="selected-item">
                    <img src="${item.image}" alt="${item.name}" style="width: 40px; height: 40px; object-fit: cover; border-radius: var(--radius-sm);">
                    <span>${item.name}</span>
                    <span class="remove-item" onclick="removeItem('${item.id}')">×</span>
                </div>
            `).join('');
        }

        function removeItem(id) {
            selectItem(id);
        }

        function clearSelection() {
            selectedItems = [];
            updateSelection();
        }

        // 分析搭配
        async function analyzeOutfit() {
            if (selectedItems.length < 2 || selectedItems.length > 5) {
                showNotification('请选择 2-5 件衣服进行分析', 'error');
                return;
            }

            const wardrobe = Storage.getAllClothing();
            const selectedClothing = wardrobe.filter(item => selectedItems.includes(item.id));

            // 显示加载状态
            const analyzeBtn = document.getElementById('analyze-outfit');
            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = `
                <div class="loading-spinner"></div>
                分析中...
            `;

            try {
                // 发送请求
                const response = await fetch('/api/claude', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: [
                            {
                                'role': 'system',
                                'content': '你是专业的时尚配色师'
                            },
                            {
                                'role': 'user',
                                'content': `我选中了以下衣服：
${selectedClothing.map(item => {
    return `
- ${item.name}
  颜色: ${item.color}
  风格: ${item.style}
  类别: ${item.category}
  图片: ${item.image}
`;
}).join('')}

请分析这套搭配的协调度，严格返回以下格式的 JSON：
{
  "score": 85,
  "colorAnalysis": "这套搭配以冷色调为主，蓝色上衣与灰色裤子形成和谐的同色系搭配",
  "pros": ["色调统一", "风格一致"],
  "cons": ["缺少亮点，略显单调"],
  "suggestion": "可以加一条浅色围巾提亮整体造型",
  "occasion": "适合日常通勤、周末逛街"
}

要求：
1. 只返回 JSON 格式
2. score 范围 0-100
3. colorAnalysis 详细描述色彩搭配
4. pros 和 cons 是数组
5. suggestion 是具体的改进建议
6. occasion 是适合的场合
7. 所有字段使用中文
8. 确保 JSON 格式正确`
                            }
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                const content = result.content;

                // 解析 JSON 响应
                let data;
                try {
                    data = JSON.parse(content);
                } catch (e) {
                    try {
                        data = JSON.parse(decodeURIComponent(escape(content)));
                    } catch (e2) {
                        console.error('解析失败:', e, e2);
                        showNotification('AI识别暂时不可用，请稍后重试', 'error');
                        return;
                    }
                }

                // 显示结果
                displayAnalysisResult(data);

            } catch (error) {
                console.error('分析失败:', error);
                showNotification('AI识别暂时不可用，请稍后重试', 'error');
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = 'AI 搭配分析';
            }
        }

        // 显示分析结果
        function displayAnalysisResult(data) {
            const analysisResult = document.getElementById('analysis-result');
            const scoreCircle = document.getElementById('score-circle');
            const scoreValue = document.getElementById('score-value');
            const colorAnalysis = document.getElementById('colorAnalysis');
            const prosList = document.getElementById('prosList');
            const consList = document.getElementById('consList');
            const suggestionText = document.getElementById('suggestionText');
            const occasionTags = document.getElementById('occasionTags');

            scoreCircle.style.background = `conic-gradient(var(--color-primary) 0deg, var(--color-primary) ${data.score * 3.6}deg, var(--color-border) ${data.score * 3.6}deg, var(--color-border) 360deg)`;
            scoreValue.textContent = data.score;
            colorAnalysis.textContent = data.colorAnalysis;

            prosList.innerHTML = data.pros.map(pro => `<li>${pro}</li>`).join('');
            consList.innerHTML = data.cons.map(con => `<li>${con}</li>`).join('');
            suggestionText.textContent = data.suggestion;

            const occasions = data.occasion.split('、');
            occasionTags.innerHTML = occasions.map(occasion => `<span class="occasion-tag">${occasion}</span>`).join('');

            analysisResult.classList.add('active');
        }

        function analyzeImage(base64Data) {
            const loadingContainer = document.getElementById('loadingContainer');
            const analysisResult = document.getElementById('analysisResult');

            loadingContainer.style.display = 'block';
            analysisResult.classList.remove('active');

            fetch('/api/analyze-image', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    image_base64: base64Data
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                loadingContainer.style.display = 'none';

                try {
                    const result = JSON.parse(data.content.replace(/```json|```/g, '').trim());

                    document.getElementById('categorySelect').value = result.category || '上衣';
                    document.getElementById('colorInput').value = result.color || '';
                    document.getElementById('styleSelect').value = result.style || '休闲';
                    document.getElementById('seasonSelect').value = result.season || '全年';
                    document.getElementById('nameInput').value = result.name || '未命名';

                    analysisResult.classList.add('active');

                } catch (error) {
                    console.error('解析结果失败:', error);
                    showNotification('AI识别暂时不可用，请稍后重试', 'error');
                }
            })
            .catch(error => {
                loadingContainer.style.display = 'none';
                console.error('识别失败:', error);
                showNotification('AI识别暂时不可用，请稍后重试', 'error');
            });
        }

        function saveClothing() {
            const imageData = document.getElementById('previewImage').src;

            const newItem = {
                id: Date.now().toString(),
                image: imageData,
                category: document.getElementById('categorySelect').value,
                color: document.getElementById('colorInput').value,
                style: document.getElementById('styleSelect').value,
                season: document.getElementById('seasonSelect').value,
                name: document.getElementById('nameInput').value,
                wornCount: 0,
                lastWorn: null,
                addedAt: new Date().toISOString()
            };

            Storage.addClothing(newItem);

            // 重置上传区域
            document.getElementById('previewContainer').classList.remove('active');
            document.getElementById('analysisResult').classList.remove('active');
            document.getElementById('fileInput').value = '';

            displayWardrobe();
            showNotification('衣物已成功添加到衣橱！', 'success');
        }

        function displayWardrobe() {
            const wardrobe = Storage.getAllClothing();
            const filter = document.getElementById('category-filter').value;
            const grid = document.getElementById('wardrobe-grid');

            const filteredWardrobe = filter === 'all'
                ? wardrobe
                : wardrobe.filter(item => item.category === filter);

            if (filteredWardrobe.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: var(--spacing-xl);">
                        <div style="width: 64px; height: 64px; background: var(--color-primary-light); border-radius: var(--radius-xl); display: flex; align-items: center; justify-content: center; margin: 0 auto var(--spacing-md);">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2">
                                <rect x="3" y="3" width="7" height="7"/>
                                <rect x="14" y="3" width="7" height="7"/>
                                <rect x="14" y="14" width="7" height="7"/>
                                <rect x="3" y="14" width="7" height="7"/>
                            </svg>
                        </div>
                        <h4 style="margin-bottom: var(--spacing-sm);">衣橱是空的</h4>
                        <p class="text-muted">上传一些衣物来开始您的穿搭之旅吧！</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredWardrobe.map(item => `
                <div class="clothing-card" data-id="${item.id}" onclick="selectItem('${item.id}')">
                    <div class="select-checkbox"></div>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteClothing('${item.id}')">删除</button>
                    ${item.wornCount > 0 ? `<div class="worn-count-badge">${item.wornCount}</div>` : ''}
                    <img class="clothing-image" src="${item.image}" alt="${item.name}">
                    <div class="clothing-info">
                        <div class="clothing-name">${item.name}</div>
                        <div class="clothing-stats">
                            <span>出镜: ${item.wornCount} 次</span>
                            <span>${item.category}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function deleteClothing(id) {
            if (confirm('确定要删除这件衣服吗？')) {
                Storage.deleteClothing(id);
                displayWardrobe();
                showNotification('衣物已删除', 'success');
            }
        }
    </script>
</body>
</html>
