<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>衣橱管理 - 直搭数字衣柜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="wardrobe">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html"><span class="brand-mark">搭</span><span>直搭数字衣柜</span></a>
      <nav class="desktop-nav" aria-label="主导航">
        <a class="nav-link" data-nav="home" href="index.html">首页</a>
        <a class="nav-link" data-nav="wardrobe" href="wardrobe.html">衣橱</a>
        <a class="nav-link" data-nav="outfit" href="outfit.html">今日穿搭</a>
        <a class="nav-link" data-nav="suggestion" href="suggestion.html">搭配建议</a>
        <a class="nav-link" data-nav="tryon" href="tryon.html">试衣间</a>
      </nav>
      <button class="menu-button" id="menuButton" aria-label="打开菜单" aria-expanded="false">☰</button>
    </div>
    <nav class="container mobile-nav" id="mobileNav" aria-label="移动端导航">
      <a class="nav-link" data-nav="home" href="index.html">首页</a>
      <a class="nav-link" data-nav="wardrobe" href="wardrobe.html">衣橱</a>
      <a class="nav-link" data-nav="outfit" href="outfit.html">今日穿搭</a>
      <a class="nav-link" data-nav="suggestion" href="suggestion.html">搭配建议</a>
      <a class="nav-link" data-nav="tryon" href="tryon.html">试衣间</a>
    </nav>
  </header>

  <main>
    <div class="container">
      <div class="section-head">
        <div>
          <p class="eyebrow">Wardrobe</p>
          <h1 style="color: var(--ink); font-size: clamp(32px, 5vw, 52px);">衣橱管理</h1>
          <p class="subtle">上传衣物照片，维护分类、颜色、风格和穿着记录。</p>
        </div>
        <div class="inline-actions">
          <button class="btn btn-ghost" id="exportData">导出数据</button>
          <label class="btn btn-ghost" style="display: inline-flex;">导入数据<input class="hidden" id="importFile" type="file" accept="application/json"></label>
        </div>
      </div>

      <section class="workspace">
        <aside class="panel">
          <h2>添加单品</h2>
          <div class="upload-zone" id="uploadZone">
            <strong>点击或拖拽上传图片</strong>
            <p class="subtle">支持 JPG、PNG、WEBP，单张不超过 5MB。</p>
            <input class="hidden" id="fileInput" type="file" accept="image/*">
          </div>

          <div id="previewPanel" class="hidden" style="margin-top: 16px;">
            <img class="preview-image" id="previewImage" alt="衣物预览">
            <button class="btn btn-secondary" id="analyzeImage" style="width: 100%; margin-top: 12px;">智能识别</button>
          </div>

          <form class="form-grid" id="itemForm" style="margin-top: 18px;">
            <label>名称<input class="field" id="itemName" required placeholder="例如：白色短袖衬衫"></label>
            <label>分类<select class="select" id="itemCategory"></select></label>
            <label>颜色<input class="field" id="itemColor" placeholder="例如：白色、深蓝色"></label>
            <label>风格<select class="select" id="itemStyle"></select></label>
            <label>季节<select class="select" id="itemSeason"></select></label>
            <button class="btn btn-primary" type="submit">保存到衣橱</button>
          </form>
        </aside>

        <section>
          <div class="toolbar">
            <div>
              <h2>全部单品 <span class="tag teal" id="wardrobeCount">0 件</span></h2>
            </div>
            <div class="filters">
              <input class="field" id="searchInput" placeholder="搜索名称、颜色、风格">
              <select class="select" id="categoryFilter"></select>
            </div>
          </div>

          <div class="wardrobe-grid" id="wardrobeGrid"></div>

          <div class="panel" id="outfit-builder" style="margin-top: 24px;">
            <div class="section-head" style="margin: 0 0 16px;">
              <div>
                <p class="eyebrow">Mix Check</p>
                <h2>搭配分析</h2>
              </div>
              <div class="inline-actions">
                <button class="btn btn-ghost" id="clearSelection">清空选择</button>
                <button class="btn btn-secondary" id="analyzeSelection" disabled>分析搭配</button>
              </div>
            </div>
            <div class="tag-row" id="selectedItems"></div>
            <div id="analysisResult" class="hidden" style="margin-top: 16px;"></div>
          </div>
        </section>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 直搭数字衣柜</div>
  </footer>

  <script src="config.js"></script>
  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
