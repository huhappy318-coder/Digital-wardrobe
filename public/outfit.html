<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日穿搭 - 直搭数字衣柜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="outfit">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html"><span class="brand-mark">搭</span><span>直搭数字衣柜</span></a>
      <nav class="desktop-nav" aria-label="主导航">
        <a class="nav-link" data-nav="home" href="index.html">首页</a>
        <a class="nav-link" data-nav="wardrobe" href="wardrobe.html">衣橱</a>
        <a class="nav-link" data-nav="outfit" href="outfit.html">今日穿搭</a>
        <a class="nav-link" data-nav="suggestion" href="suggestion.html">搭配建议</a>
        <a class="nav-link" data-nav="tryon" href="tryon.html">试衣间</a>
      </nav>
      <button class="menu-button" id="menuButton" aria-label="打开菜单" aria-expanded="false">☰</button>
    </div>
    <nav class="container mobile-nav" id="mobileNav" aria-label="移动端导航">
      <a class="nav-link" data-nav="home" href="index.html">首页</a>
      <a class="nav-link" data-nav="wardrobe" href="wardrobe.html">衣橱</a>
      <a class="nav-link" data-nav="outfit" href="outfit.html">今日穿搭</a>
      <a class="nav-link" data-nav="suggestion" href="suggestion.html">搭配建议</a>
      <a class="nav-link" data-nav="tryon" href="tryon.html">试衣间</a>
    </nav>
  </header>

  <main>
    <div class="container">
      <div class="section-head">
        <div>
          <p class="eyebrow">Outfit Today</p>
          <h1 style="color: var(--ink); font-size: clamp(32px, 5vw, 52px);">今日穿搭</h1>
          <p class="subtle">根据城市天气和衣橱数据，生成一套可直接穿的组合。</p>
        </div>
      </div>

      <section class="grid grid-2">
        <div class="panel">
          <h2>天气条件</h2>
          <form class="inline-actions" id="weatherForm">
            <input class="field" id="cityInput" placeholder="输入城市，例如 上海 / Beijing" value="上海">
            <button class="btn btn-secondary" id="weatherSubmit" type="submit">查询天气</button>
          </form>
          <div class="weather-card hidden" id="weatherCard" style="margin-top: 18px;">
            <div>
              <p class="eyebrow" style="color: #BFE8E4;">Weather</p>
              <h2 id="weatherCity" style="color: white; margin-bottom: 6px;">上海</h2>
              <p id="weatherDesc" style="margin: 0; color: rgba(255,255,255,.82);">多云</p>
            </div>
            <div>
              <div class="temperature" id="weatherTemp">23°C</div>
              <p id="weatherMeta" style="margin: 6px 0 0; color: rgba(255,255,255,.82);">体感 23°C · 湿度 58%</p>
            </div>
          </div>
        </div>
        <div class="panel">
          <h2>生成策略</h2>
          <p class="subtle">优先选择符合温度、较少穿着且结构完整的组合。没有后端或天气服务时，会自动使用演示天气，保证页面可体验。</p>
          <button class="btn btn-primary" id="generateOutfit">生成今日穿搭</button>
        </div>
      </section>

      <section id="outfitResult" class="hidden" style="margin-top: 24px;"></section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 直搭数字衣柜</div>
  </footer>

  <script src="config.js"></script>
  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
