<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClosetAI - 衣橱</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script type="module" src="/js/app.js"></script>
</head>
<body data-page="wardrobe">
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="brand-mark"></span>
          <span>ClosetAI</span>
        </div>
        <nav class="nav" aria-label="主导航">
          <a href="/" data-nav="dashboard" data-i18n="nav.home">首页</a>
          <a href="/wardrobe.html" data-nav="wardrobe" data-i18n="nav.wardrobe">衣橱</a>
          <a href="/outfit.html" data-nav="outfit" data-i18n="nav.outfit">搭配</a>
          <a href="/tryon.html" data-nav="canvas" data-i18n="nav.canvas">画布</a>
          <a href="/suggestion.html" data-nav="suggestion" data-i18n="nav.suggestion">推荐</a>
        </nav>
        <div class="topbar-actions">
          <div class="lang-switch" aria-label="语言切换">
            <button type="button" class="lang-toggle" data-lang-option="zh">中文</button>
            <button type="button" class="lang-toggle" data-lang-option="en">EN</button>
          </div>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="hero-panel panel">
        <div class="eyebrow">Wardrobe</div>
        <h1 data-i18n="wardrobe.heroTitle">衣橱管理</h1>
        <p data-i18n="wardrobe.heroDesc">添加、编辑、筛选和管理你的衣物。</p>
      </section>

      <section id="wardrobe-stats" class="panel"></section>

      <section class="layout-two">
        <section class="panel stack">
          <div class="section-title">
            <h2 data-i18n="wardrobe.formTitle">添加或编辑单品</h2>
            <p data-i18n="wardrobe.formDesc">把衣橱核心字段保存在本地。</p>
          </div>
          <form id="wardrobe-form" class="card-form">
            <input id="item-id" type="hidden" />
            <input id="item-created-at" type="hidden" />
            <div class="form-grid">
              <label class="field">
                <span data-i18n="wardrobe.name">名称</span>
                <input id="item-name" type="text" required data-i18n-placeholder="wardrobe.name" placeholder="名称" />
              </label>
              <label class="field">
                <span data-i18n="wardrobe.category">分类</span>
                <select id="item-category"></select>
              </label>
              <label class="field">
                <span data-i18n="wardrobe.color">颜色</span>
                <input id="item-color" type="text" required data-i18n-placeholder="wardrobe.color" placeholder="颜色" />
              </label>
              <label class="field">
                <span data-i18n="wardrobe.season">季节</span>
                <select id="item-season"></select>
              </label>
              <label class="field">
                <span data-i18n="wardrobe.occasion">场景</span>
                <select id="item-occasion"></select>
              </label>
              <label class="field">
                <span data-i18n="wardrobe.image">图片</span>
                <input id="item-image" type="file" accept="image/*" />
              </label>
            </div>
            <label class="field">
              <span data-i18n="wardrobe.notes">备注</span>
              <textarea id="item-notes" data-i18n-placeholder="wardrobe.notes" placeholder="备注"></textarea>
            </label>
            <div id="image-preview" class="preview-frame"></div>
            <div class="button-row">
              <button id="analyze-image-btn" type="button" class="btn btn-secondary" data-i18n="wardrobe.analyzeImage">分析图片</button>
              <button id="save-item-btn" type="submit" class="btn" data-i18n="wardrobe.saveItem">保存单品</button>
              <button id="cancel-edit-btn" type="button" class="btn btn-ghost" data-i18n="wardrobe.reset">重置</button>
            </div>
          </form>
        </section>

        <section class="panel stack">
          <div class="section-title">
            <h2 data-i18n="wardrobe.filterTitle">筛选</h2>
            <p data-i18n="wardrobe.filterDesc">按属性浏览衣橱。</p>
          </div>
          <div class="form-grid filter-grid">
            <label class="field">
              <span data-i18n="wardrobe.category">分类</span>
              <select id="filter-category">
                <option value="all" data-i18n="wardrobe.option.all">全部</option>
              </select>
            </label>
            <label class="field">
              <span data-i18n="wardrobe.color">颜色</span>
              <select id="filter-color">
                <option value="all" data-i18n="wardrobe.option.all">全部</option>
              </select>
            </label>
            <label class="field">
              <span data-i18n="wardrobe.season">季节</span>
              <select id="filter-season">
                <option value="all" data-i18n="wardrobe.option.all">全部</option>
              </select>
            </label>
            <label class="field">
              <span data-i18n="wardrobe.occasion">场景</span>
              <select id="filter-occasion">
                <option value="all" data-i18n="wardrobe.option.all">全部</option>
              </select>
            </label>
          </div>
          <div id="wardrobe-grid" class="wardrobe-grid"></div>
        </section>
      </section>
    </main>
  </div>
</body>
</html>
