<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClosetAI - 数字衣橱</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script type="module" src="/js/app.js"></script>
</head>
<body data-page="dashboard">
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="brand-mark"></span>
          <span>ClosetAI</span>
        </div>
        <nav class="nav" aria-label="主导航">
          <a href="/" data-nav="dashboard" data-i18n="nav.home">首页</a>
          <a href="/wardrobe.html" data-nav="wardrobe" data-i18n="nav.wardrobe">衣橱</a>
          <a href="/outfit.html" data-nav="outfit" data-i18n="nav.outfit">搭配</a>
          <a href="/tryon.html" data-nav="canvas" data-i18n="nav.canvas">画布</a>
          <a href="/suggestion.html" data-nav="suggestion" data-i18n="nav.suggestion">推荐</a>
        </nav>
        <div class="topbar-actions">
          <div class="lang-switch" aria-label="语言切换">
            <button type="button" class="lang-toggle" data-lang-option="zh">中文</button>
            <button type="button" class="lang-toggle" data-lang-option="en">EN</button>
          </div>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="hero-panel panel">
        <div class="eyebrow">ClosetAI</div>
        <h1 data-i18n="dashboard.heroTitle">数字衣橱</h1>
        <p data-i18n="dashboard.heroDesc">添加衣物，搭配组合，向后端请求穿搭建议。</p>
        <div class="hero-actions">
          <button class="btn" data-dashboard-link="/wardrobe.html" data-i18n="dashboard.ctaWardrobe">打开衣橱</button>
          <button class="btn btn-secondary" data-dashboard-link="/tryon.html" data-i18n="dashboard.ctaCanvas">打开画布</button>
          <button class="btn btn-secondary" data-dashboard-link="/suggestion.html" data-i18n="dashboard.ctaSuggestion">查看推荐</button>
        </div>
      </section>

      <section id="dashboard-stats" class="panel"></section>

      <section class="layout-two">
        <section class="panel stack">
          <div class="section-title">
            <h2 data-i18n="dashboard.recentWardrobe">最近添加</h2>
            <p data-i18n="dashboard.recentWardrobeDesc">本地衣橱中的最新单品。</p>
          </div>
          <div id="recent-items" class="stack"></div>
        </section>

        <section class="panel stack">
          <div class="section-title">
            <h2 data-i18n="dashboard.savedOutfits">已保存搭配</h2>
            <p data-i18n="dashboard.savedOutfitsDesc">保存到本地的画布组合。</p>
          </div>
          <div id="recent-outfits" class="stack"></div>
        </section>
      </section>
    </main>
  </div>
</body>
</html>
